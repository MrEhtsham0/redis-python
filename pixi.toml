[workspace]
authors = ["MrEhtsham0 <mrehtsham0@gmail.com>"]
channels = ["conda-forge"]
name = "redis_pratice"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
api = "uvicorn main:app --reload --host 0.0.0.0 --port 8000 --log-level info"
[dependencies]
python = ">=3.14.5,<3.15"
fastapi = ">=0.136.3,<0.137"
uvicorn = ">=0.49.0,<0.50"
python-multipart = ">=0.0.32,<0.0.33"
pydantic-settings = ">=2.14.1,<3"

[pypi-dependencies]
redis = "==7.4.0"
langgraph = ">=1.2.2, <2"
langgraph-checkpoint-redis = ">=0.4.1, <0.5"
langchain-openai = ">=1.3.2, <2"
colorama = "*"
