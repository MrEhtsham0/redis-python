[workspace]
authors = ["MrEhtsham0 <mrehtsham0@gmail.com>"]
channels = ["conda-forge"]
name = "redis_pratice"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
api = "uvicorn main:app --reload --host 0.0.0.0 --port 8000 --log-level info"
seed = "PYTHONPATH=. python script/fake_users.py"

[dependencies]
python = ">=3.14.5,<3.15"
fastapi = ">=0.136.3,<0.137"
uvicorn = ">=0.49.0,<0.50"
python-multipart = ">=0.0.32,<0.0.33"
pydantic-settings = ">=2.14.1,<3"
langchain-mcp-adapters = ">=0.3.0,<0.4"
faker = ">=40.23.0,<41"
ipykernel = ">=7.3.0,<8"

[pypi-dependencies]
redis = "==7.4.0"
langgraph = ">=1.2.2, <2"
langgraph-checkpoint-redis = ">=0.4.1, <0.5"
langchain-openai = ">=1.3.2, <2"
langchain-tavily = ">=0.2.0, <1"
colorama = "*"
mcp-postgres-server = ">=0.1.2, <0.2"
sqlalchemy = ">=2.0.50, <3"
asyncpg = ">=0.30.0, <1"
langsmith = { version = "*", extras = ["sandbox"] }
deepagents = ">=0.6.7, <0.7"
langchain-daytona = ">=0.0.6, <0.0.7"
